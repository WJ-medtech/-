<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>絵あわせ｜POCUS Drawing Match</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --card: #1a1a28;
    --border: #2a2a40;
    --accent: #00e5ff;
    --accent2: #ff3d6e;
    --accent3: #ffe600;
    --text: #e8e8f0;
    --muted: #6060a0;
    --glow: 0 0 20px rgba(0,229,255,0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 20%, rgba(0,229,255,0.05) 0%, transparent 60%),
      radial-gradient(ellipse 40% 60% at 80% 80%, rgba(255,61,110,0.05) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }

  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }

  #app {
    position: relative; z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 20px 16px;
  }

  header { text-align: center; margin-bottom: 20px; }

  .title-main {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(40px, 9vw, 72px);
    letter-spacing: 0.1em;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }

  .title-sub {
    font-size: 11px; letter-spacing: 0.3em;
    color: var(--muted); text-transform: uppercase; margin-top: 4px;
  }

  /* ── STOPWATCH BAR ── */
  #stopwatch-bar {
    display: none;
    align-items: center;
    justify-content: center;
    gap: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 24px;
    margin-bottom: 20px;
  }

  #timer-display {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(32px, 7vw, 56px);
    color: var(--accent);
    text-shadow: var(--glow);
    letter-spacing: 0.05em;
    min-width: 155px;
    text-align: center;
    transition: color 0.3s;
  }

  #timer-display.danger {
    color: var(--accent2);
    text-shadow: 0 0 20px rgba(255,61,110,0.6);
    animation: blink 0.5s infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  #progress-section {
    display: flex; gap: 8px; align-items: center; flex: 1;
  }

  .q-indicator {
    flex: 1; height: 6px;
    background: var(--border); border-radius: 3px; overflow: hidden;
  }

  .q-indicator-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 3px; width: 0%; transition: width 0.4s ease;
  }

  .q-label {
    font-size: 11px; color: var(--muted);
    letter-spacing: 0.15em; min-width: 50px; text-align: right;
  }

  /* ── SCREENS ── */
  .screen { display: none; }
  .screen.active { display: block; }

  /* ── START SCREEN ── */
  #start-screen { text-align: center; padding: 80px 20px; }

  .btn-primary {
    display: inline-block;
    background: linear-gradient(135deg, var(--accent), #0080ff);
    color: #000;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px; letter-spacing: 0.15em;
    padding: 18px 56px; border: none; border-radius: 8px;
    cursor: pointer;
    box-shadow: 0 0 30px rgba(0,229,255,0.3);
    transition: all 0.2s;
  }

  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 40px rgba(0,229,255,0.5); }
  .btn-primary:active { transform: translateY(0); }

  /* ── GAME SCREEN ── */
  #game-screen.active { display: flex; flex-direction: column; gap: 14px; }

  #question-label {
    text-align: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px; letter-spacing: 0.3em; color: var(--muted);
  }

  #question-label span { color: var(--accent); font-size: 22px; }

  /* ── IMAGE GRID ── */
  #image-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
  }

  .img-slot {
    aspect-ratio: 1;
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    position: relative;
    transition: border-color 0.3s, box-shadow 0.3s;
  }

  .img-slot.hidden-slot { border-style: dashed; }

  .img-slot.revealed {
    border-color: var(--accent);
    box-shadow: 0 0 20px rgba(0,229,255,0.25);
  }

  .img-slot img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .slot-overlay {
    position: absolute; inset: 0;
    background: var(--card);
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.35s;
  }

  .slot-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px; color: var(--border);
  }

  .img-slot.revealed .slot-overlay { opacity: 0; pointer-events: none; }

  .slot-laptime {
    position: absolute; bottom: 6px; right: 6px;
    background: rgba(0,0,0,0.78);
    color: var(--accent3);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px; padding: 2px 7px; border-radius: 4px;
    opacity: 0; transition: opacity 0.3s;
  }

  .img-slot.revealed .slot-laptime { opacity: 1; }

  .img-slot.current {
    border-color: var(--accent3);
    animation: pulse-current 1s infinite;
  }

  @keyframes pulse-current {
    0%, 100% { box-shadow: 0 0 18px rgba(255,230,0,0.3); }
    50%       { box-shadow: 0 0 38px rgba(255,230,0,0.65); }
  }

  /* ── PINPON BUTTON ── */
  #pinpon-wrap { text-align: center; }

  #pinpon-btn {
    display: inline-flex; flex-direction: column;
    align-items: center; gap: 6px;
    background: radial-gradient(circle at 35% 35%, #ff6b6b, #cc0033);
    border: none; border-radius: 50%;
    width: 110px; height: 110px;
    cursor: pointer;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px; letter-spacing: 0.2em; color: #fff;
    box-shadow: 0 8px 0 #800020, 0 12px 20px rgba(0,0,0,0.5), inset 0 2px 4px rgba(255,255,255,0.3);
    transition: all 0.08s;
    position: relative; overflow: hidden;
  }

  #pinpon-btn::before {
    content: '';
    position: absolute; top: 15%; left: 20%;
    width: 40%; height: 25%;
    background: rgba(255,255,255,0.25);
    border-radius: 50%; filter: blur(4px);
  }

  #pinpon-btn:hover { transform: translateY(2px); box-shadow: 0 6px 0 #800020, 0 10px 15px rgba(0,0,0,0.5), inset 0 2px 4px rgba(255,255,255,0.3); }
  #pinpon-btn:active { transform: translateY(8px); box-shadow: 0 0 0 #800020, 0 4px 10px rgba(0,0,0,0.5), inset 0 2px 4px rgba(255,255,255,0.3); }
  #pinpon-btn .btn-icon { font-size: 26px; }
  #pinpon-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; box-shadow: 0 8px 0 #800020; }

  /* ── LAP TABLE ── */
  #lap-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    max-height: 160px;
    overflow-y: auto;
  }

  #lap-section h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px; letter-spacing: 0.2em;
    color: var(--muted); margin-bottom: 8px;
  }

  #lap-list { list-style: none; display: flex; flex-direction: column; gap: 5px; }

  #lap-list li {
    display: flex; justify-content: space-between; align-items: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px; padding: 5px 10px;
    background: var(--card); border-radius: 5px;
    border-left: 3px solid var(--border);
  }

  #lap-list li.lap-q { border-left-color: var(--accent2); font-weight: bold; color: var(--accent2); }
  #lap-list li.lap-img { border-left-color: var(--accent); padding-left: 18px; }
  .lap-time { color: var(--accent3); }

  /* ── RESULT SCREEN ── */
  #result-screen { animation: fadeUp 0.5s ease; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  #result-screen h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px; letter-spacing: 0.2em;
    text-align: center; margin-bottom: 6px;
    background: linear-gradient(135deg, var(--accent3), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .result-total {
    text-align: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: 18px; color: var(--muted); margin-bottom: 28px;
  }

  .result-total strong { color: var(--accent); font-size: 26px; }

  .result-set { margin-bottom: 28px; }

  .result-q-header {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px; letter-spacing: 0.2em;
    color: var(--accent2); margin-bottom: 10px;
    padding-bottom: 7px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }

  .result-q-time { font-family: 'Share Tech Mono', monospace; font-size: 13px; color: var(--accent3); }

  .result-img-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }

  .result-img-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; overflow: hidden; text-align: center;
  }

  .result-img-card img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; }

  .result-img-time {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px; color: var(--accent3);
    padding: 5px; background: var(--surface);
  }

  #retry-btn {
    display: block; width: 100%;
    background: linear-gradient(135deg, var(--accent), #0080ff);
    color: #000;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px; letter-spacing: 0.2em;
    padding: 16px; border: none; border-radius: 8px;
    cursor: pointer; margin-top: 20px;
    box-shadow: 0 0 30px rgba(0,229,255,0.3);
    transition: all 0.2s;
  }

  #retry-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 40px rgba(0,229,255,0.5); }

  /* ── FLASH ── */
  #flash {
    position: fixed; inset: 0; background: white;
    opacity: 0; pointer-events: none; z-index: 999;
    transition: opacity 0.05s;
  }

  #flash.on { opacity: 0.18; transition: none; }

  /* ══════════════════════════════════════
     VICTORY OVERLAY
  ══════════════════════════════════════ */
  #victory-screen {
    position: fixed; inset: 0; z-index: 600;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at 50% 60%, #08002a 0%, #000008 70%);
    overflow: hidden;
  }

  #victory-screen.active { display: flex; }

  #victory-canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }

  .burst-ring {
    position: absolute;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    animation: burstRing 2.2s ease-out infinite;
    pointer-events: none;
  }

  @keyframes burstRing {
    0%   { width: 0;     height: 0;     opacity: 0.9; }
    100% { width: 800px; height: 800px; opacity: 0; }
  }

  .victory-content {
    position: relative; z-index: 10;
    text-align: center;
    animation: victoryEntry 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    padding: 0 20px;
  }

  @keyframes victoryEntry {
    from { transform: scale(0.3) translateY(80px); opacity: 0; }
    to   { transform: scale(1) translateY(0); opacity: 1; }
  }

  .victory-rank {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(22px, 5vw, 40px);
    letter-spacing: 0.35em; color: var(--accent3);
    animation: shimmer 1.6s ease-in-out infinite;
    margin-bottom: 6px;
  }

  @keyframes shimmer {
    0%, 100% { text-shadow: 0 0 30px rgba(255,230,0,0.8), 0 0 60px rgba(255,230,0,0.4); }
    50%       { text-shadow: 0 0 60px #ffe600, 0 0 120px rgba(255,200,0,0.6), 0 0 200px rgba(255,150,0,0.2); }
  }

  .victory-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(60px, 15vw, 128px);
    letter-spacing: 0.06em; line-height: 0.85;
    background: linear-gradient(160deg, #ffffff 0%, var(--accent3) 45%, var(--accent) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 24px rgba(255,230,0,0.6));
    animation: titlePulse 2.2s ease-in-out infinite;
    margin-bottom: 12px;
  }

  @keyframes titlePulse {
    0%, 100% { filter: drop-shadow(0 0 20px rgba(255,230,0,0.5)); }
    50%       { filter: drop-shadow(0 0 50px rgba(255,230,0,1)) drop-shadow(0 0 100px rgba(0,229,255,0.5)); }
  }

  .victory-time {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(38px, 9vw, 72px);
    color: var(--accent);
    text-shadow: 0 0 24px rgba(0,229,255,0.9), 0 0 60px rgba(0,229,255,0.4);
    letter-spacing: 0.08em;
    margin-bottom: 10px;
  }

  .victory-sub {
    font-size: clamp(13px, 2.5vw, 18px);
    color: rgba(255,255,255,0.65);
    letter-spacing: 0.18em;
    margin-bottom: 28px;
  }

  .stars-ring {
    display: flex; gap: 20px; justify-content: center;
    margin-bottom: 32px;
    font-size: clamp(28px, 6vw, 52px);
  }

  .star-item { display: inline-block; animation: starPop 0.5s cubic-bezier(0.34,1.56,0.64,1) both; }
  .star-item:nth-child(1) { animation-delay: 0.6s; }
  .star-item:nth-child(2) { animation-delay: 0.8s; animation-name: starPopBig; }
  .star-item:nth-child(3) { animation-delay: 1.0s; }

  @keyframes starPop {
    from { transform: scale(0) rotate(-30deg); opacity: 0; }
    to   { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  @keyframes starPopBig {
    from { transform: scale(0) rotate(30deg); opacity: 0; }
    to   { transform: scale(1.4) rotate(0deg); opacity: 1; }
  }

  #victory-continue-btn {
    background: linear-gradient(135deg, var(--accent3), #ff8c00);
    color: #000;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px; letter-spacing: 0.2em;
    padding: 15px 52px; border: none; border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 0 30px rgba(255,230,0,0.5), 0 8px 0 rgba(0,0,0,0.4);
    transition: all 0.2s;
    animation: btnAppear 0.5s 1.2s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  @keyframes btnAppear {
    from { transform: scale(0); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }

  #victory-continue-btn:hover {
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 0 50px rgba(255,230,0,0.8), 0 10px 0 rgba(0,0,0,0.4);
  }

  #victory-continue-btn:active { transform: translateY(4px) scale(0.98); }
</style>
</head>
<body>

<div id="flash"></div>

<!-- ── VICTORY OVERLAY ── -->
<div id="victory-screen">
  <canvas id="victory-canvas"></canvas>
  <div class="burst-ring" style="left:50%;top:50%;border:2px solid rgba(0,229,255,0.5);animation-delay:0s"></div>
  <div class="burst-ring" style="left:50%;top:50%;border:2px solid rgba(255,61,110,0.5);animation-delay:0.73s"></div>
  <div class="burst-ring" style="left:50%;top:50%;border:2px solid rgba(255,230,0,0.5);animation-delay:1.46s"></div>

  <div class="victory-content">
    <div class="victory-rank">🏆 &nbsp; 1位通過 &nbsp; 🏆</div>
    <div class="victory-title">絵合わせ<br>CLEAR!</div>
    <div class="victory-time" id="victory-time-display">—</div>
    <div class="victory-sub">90秒以内クリア達成！お見事！</div>
    <div class="stars-ring">
      <span class="star-item">⭐</span>
      <span class="star-item">🌟</span>
      <span class="star-item">⭐</span>
    </div>
    <button id="victory-continue-btn" onclick="afterVictory()">RESULT を見る →</button>
  </div>
</div>

<!-- ── MAIN APP ── -->
<div id="app">
  <header>
    <div class="title-main">絵あわせ</div>
    <div class="title-sub">POCUS Drawing Match — Emergency Ultrasound Competition</div>
  </header>

  <!-- STOPWATCH BAR -->
  <div id="stopwatch-bar">
    <div>
      <div style="font-size:10px;letter-spacing:0.2em;color:var(--muted);margin-bottom:2px;">TOTAL TIME</div>
      <div id="timer-display">00:00.0</div>
    </div>
    <div style="flex:1;">
      <div id="progress-section">
        <div class="q-indicator"><div class="q-indicator-fill" id="prog1"></div></div>
        <div class="q-indicator"><div class="q-indicator-fill" id="prog2"></div></div>
        <div class="q-indicator"><div class="q-indicator-fill" id="prog3"></div></div>
        <div class="q-label" id="q-label-bar">Q1 / 3</div>
      </div>
    </div>
  </div>

  <!-- START SCREEN -->
  <div id="start-screen" class="screen active">
    <button class="btn-primary" onclick="startGame()">▶ スタート</button>
  </div>

  <!-- GAME SCREEN -->
  <div id="game-screen" class="screen">
    <div id="question-label">QUESTION <span id="q-num">1</span> / 3</div>

    <div id="image-grid">
      <div class="img-slot revealed current" id="slot0">
        <img src="" alt="">
        <div class="slot-overlay"><div class="slot-number">1</div></div>
        <div class="slot-laptime" id="lt0"></div>
      </div>
      <div class="img-slot revealed" id="slot1">
        <img src="" alt="">
        <div class="slot-overlay"><div class="slot-number">2</div></div>
        <div class="slot-laptime" id="lt1"></div>
      </div>
      <div class="img-slot revealed" id="slot2">
        <img src="" alt="">
        <div class="slot-overlay"><div class="slot-number">3</div></div>
        <div class="slot-laptime" id="lt2"></div>
      </div>
    </div>

    <div id="pinpon-wrap">
      <button id="pinpon-btn" onclick="pinpon()">
        <span class="btn-icon">🔔</span>
        PINPON
      </button>
    </div>

    <div id="lap-section">
      <h3>⏱ LAP TIMES</h3>
      <ul id="lap-list"></ul>
    </div>
  </div>

  <!-- RESULT SCREEN -->
  <div id="result-screen" class="screen">
    <h2>RESULT</h2>
    <div class="result-total">Total: <strong id="total-time-display">—</strong></div>
    <div id="result-body"></div>
    <button id="retry-btn" onclick="resetGame()">🔄 もう一度</button>
  </div>
</div>

<script>
// ─── CONFIG ───
const IMAGE_COUNT = 22;
const IMAGE_DIR = 'images/';
const IMAGE_EXT = '.png';
function imgSrc(n) { return IMAGE_DIR + 'image' + String(n).padStart(2,'0') + IMAGE_EXT; }

// ─── AUDIO ───
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function noiseBurst(ctx, t, dur, freq, q, vol) {
  const buf = ctx.createBuffer(1, ctx.sampleRate * dur, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * Math.exp(-i/(ctx.sampleRate*dur*0.3));
  const src = ctx.createBufferSource();
  const bpf = ctx.createBiquadFilter(); bpf.type='bandpass'; bpf.frequency.value=freq; bpf.Q.value=q;
  const g = ctx.createGain(); g.gain.value=vol;
  src.buffer=buf; src.connect(bpf); bpf.connect(g); g.connect(ctx.destination);
  src.start(t); src.stop(t+dur);
}

function tone(ctx, t, freq, dur, vol, type='sine', detune=0) {
  const osc = ctx.createOscillator();
  const g = ctx.createGain();
  osc.connect(g); g.connect(ctx.destination);
  osc.type=type; osc.frequency.value=freq; osc.detune.value=detune;
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(vol, t+0.01);
  g.gain.exponentialRampToValueAtTime(0.001, t+dur);
  osc.start(t); osc.stop(t+dur+0.05);
}

function playPinpon() {
  const ctx = getAudioCtx(); const t = ctx.currentTime;
  [523.25,659.25,783.99,1046.5].forEach((f,i) => tone(ctx,t,f,0.7,0.25-i*0.03));
  [659.25,783.99,1046.5,1318.5,1567.98].forEach((f,i) => tone(ctx,t+i*0.06,f,0.22,0.16,'triangle'));
  noiseBurst(ctx,t,0.08,180,0.7,0.2);
}

function playQuestionClear() {
  const ctx = getAudioCtx(); const t = ctx.currentTime;
  [523.25,659.25,783.99,1046.5].forEach((f,i) => {
    tone(ctx,t+i*0.1,f,0.35,0.35,'triangle');
    tone(ctx,t+i*0.1,f*2,0.2,0.1,'sine');
  });
  noiseBurst(ctx,t+0.05,0.15,2000,0.5,0.25);
  noiseBurst(ctx,t+0.35,0.12,2000,0.5,0.2);
}

function playTransition() {
  const ctx = getAudioCtx(); const t = ctx.currentTime;
  const osc = ctx.createOscillator();
  const g = ctx.createGain();
  osc.connect(g); g.connect(ctx.destination);
  osc.type='sine';
  osc.frequency.setValueAtTime(300,t);
  osc.frequency.exponentialRampToValueAtTime(1200,t+0.3);
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(0.3,t+0.05);
  g.gain.exponentialRampToValueAtTime(0.001,t+0.35);
  osc.start(t); osc.stop(t+0.4);
  [800,1000,1300].forEach((f,i)=>tone(ctx,t+0.1+i*0.05,f,0.15,0.08,'sine'));
}

function playStart() {
  const ctx = getAudioCtx(); const t = ctx.currentTime;
  [0,0.18,0.36].forEach((s,i)=>{
    noiseBurst(ctx,t+s,0.04,1200,2,0.15);
    tone(ctx,t+s,880+i*110,0.12,0.2,'square');
  });
  [523.25,659.25,783.99,1046.5].forEach((f,i)=>tone(ctx,t+0.6,f,0.5,0.3-i*0.04,'sawtooth',-i*8));
  noiseBurst(ctx,t+0.6,0.2,400,0.5,0.3);
}

function playVictoryFanfare() {
  const ctx = getAudioCtx(); const t = ctx.currentTime;
  // Grand fanfare melody
  const melody = [
    [523.25,0,0.22],[659.25,0.14,0.22],[783.99,0.28,0.22],[1046.5,0.42,0.55],
    [880,0.62,0.14],[1046.5,0.76,0.14],[1318.5,0.9,0.9]
  ];
  melody.forEach(([f,s,d])=>{
    tone(ctx,t+s,f,d,0.38,'triangle');
    tone(ctx,t+s,f*0.5,d,0.14,'sine');
    tone(ctx,t+s,f*2,d*0.5,0.08,'sine');
  });
  // Drum kit
  [0,0.14,0.28,0.42,0.56,0.7,0.84,0.98].forEach(s=>noiseBurst(ctx,t+s,0.06,3000,0.4,0.14));
  [0,0.28,0.56,0.84].forEach(s=>noiseBurst(ctx,t+s,0.18,120,1,0.32));
  [0,0.42,0.9].forEach(s=>noiseBurst(ctx,t+s,0.4,6000,0.3,0.18));
  // Finale chord
  [523.25,659.25,783.99,1046.5,1318.5,1567.98].forEach((f,i)=>tone(ctx,t+1.3,f,1.4,0.26-i*0.03,'sine'));
  noiseBurst(ctx,t+1.3,0.5,300,0.5,0.28);
}

function playResultAppear() {
  const ctx = getAudioCtx(); const t = ctx.currentTime;
  [261.63,329.63,392,523.25,659.25].forEach((f,i)=>tone(ctx,t+i*0.08,f,0.3,0.15,'sine'));
}

// ─── FIREWORKS ───
let fireworksRAF = null;
const particles = [];

function startFireworks() {
  const canvas = document.getElementById('victory-canvas');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const colors = ['#ff3d6e','#00e5ff','#ffe600','#00ff88','#ff8c00','#ff66ff','#ffffff','#aaffaa'];

  function launchRocket() {
    const x = 80 + Math.random() * (canvas.width - 160);
    const targetY = 60 + Math.random() * canvas.height * 0.45;
    const color = colors[Math.floor(Math.random()*colors.length)];
    const count = 70 + Math.floor(Math.random()*80);
    for (let i = 0; i < count; i++) {
      const angle = (Math.PI*2*i)/count + (Math.random()-0.5)*0.3;
      const speed = 1.5 + Math.random()*7;
      particles.push({
        x, y: targetY,
        vx: Math.cos(angle)*speed,
        vy: Math.sin(angle)*speed,
        color,
        alpha: 1,
        size: 1.5 + Math.random()*3.5,
        decay: 0.011 + Math.random()*0.009,
        gravity: 0.07 + Math.random()*0.05,
        trail: [],
      });
    }
  }

  let tick = 0;
  function loop() {
    ctx.fillStyle = 'rgba(0,0,8,0.16)';
    ctx.fillRect(0,0,canvas.width,canvas.height);

    tick++;
    if (tick % 26 === 0) launchRocket();

    for (let i = particles.length-1; i >= 0; i--) {
      const p = particles[i];
      p.trail.push({x:p.x, y:p.y, a:p.alpha});
      if (p.trail.length > 7) p.trail.shift();

      p.x += p.vx; p.y += p.vy;
      p.vy += p.gravity;
      p.vx *= 0.97; p.vy *= 0.99;
      p.alpha -= p.decay;

      p.trail.forEach((tr,ti) => {
        ctx.beginPath();
        ctx.arc(tr.x, tr.y, p.size*0.45, 0, Math.PI*2);
        ctx.fillStyle = p.color;
        ctx.globalAlpha = tr.a * (ti/p.trail.length) * 0.35;
        ctx.fill();
      });

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = p.alpha;
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 10;
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;

      if (p.alpha <= 0) particles.splice(i,1);
    }

    fireworksRAF = requestAnimationFrame(loop);
  }

  // Burst right away
  for (let i = 0; i < 6; i++) setTimeout(launchRocket, i*100);
  fireworksRAF = requestAnimationFrame(loop);
}

function stopFireworks() {
  if (fireworksRAF) { cancelAnimationFrame(fireworksRAF); fireworksRAF = null; }
  particles.length = 0;
  const c = document.getElementById('victory-canvas');
  c.getContext('2d').clearRect(0,0,c.width,c.height);
}

// ─── STATE ───
let questions = [];
let currentQ = 0, currentSlot = 0;
let lapTimes = [], qLapTimes = [];
let startTime = null, timerInterval = null;
let elapsed = 0, finalMs = 0;

function getElapsed() { return startTime ? Date.now()-startTime : elapsed; }

function formatTime(ms) {
  const total = Math.floor(ms/100);
  const tenths = total % 10;
  const secs = Math.floor(total/10) % 60;
  const mins = Math.floor(total/600);
  return String(mins).padStart(2,'0') + ':' + String(secs).padStart(2,'0') + '.' + tenths;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

// ─── GAME ───
function startGame() {
  getAudioCtx(); playStart();
  const nums = Array.from({length:IMAGE_COUNT},(_,i)=>i+1);
  const picked = shuffle(nums).slice(0,9);
  questions = [picked.slice(0,3), picked.slice(3,6), picked.slice(6,9)];
  lapTimes=[]; qLapTimes=[]; currentQ=0; currentSlot=0;

  document.getElementById('stopwatch-bar').style.display='flex';
  document.getElementById('lap-list').innerHTML='';
  showScreen('game-screen');
  loadQuestion();

  startTime = Date.now();
  timerInterval = setInterval(tickTimer, 100);
}

function loadQuestion() {
  const imgs = questions[currentQ];
  document.getElementById('q-num').textContent = currentQ+1;
  document.getElementById('q-label-bar').textContent = `Q${currentQ+1} / 3`;

  for (let i = 0; i < 3; i++) {
    const slot = document.getElementById('slot'+i);
    slot.querySelector('img').src = imgSrc(imgs[i]);
    slot.className = 'img-slot revealed';
    slot.classList.toggle('current', i===0);
    document.getElementById('lt'+i).textContent = '';
    slot.querySelector('.slot-number').textContent = i+1;
  }

  currentSlot = 0;
  document.getElementById('pinpon-btn').disabled = false;

  if (currentQ > 0) {
    const sep = document.createElement('li');
    sep.style.cssText='border-left-color:var(--muted);color:var(--muted);font-size:11px;letter-spacing:0.15em;';
    sep.innerHTML=`<span>── Q${currentQ+1} ──</span><span></span>`;
    document.getElementById('lap-list').appendChild(sep);
  }
}

function tickTimer() {
  const ms = getElapsed();
  document.getElementById('timer-display').textContent = formatTime(ms);
  document.getElementById('timer-display').classList.toggle('danger', ms > 75000);
}

function pinpon() {
  if (currentSlot >= 3) return;
  getAudioCtx(); playPinpon(); flashScreen();

  const ms = getElapsed();
  lapTimes.push(ms);

  const slot = document.getElementById('slot'+currentSlot);
  slot.classList.remove('current');
  document.getElementById('lt'+currentSlot).textContent = formatTime(ms);

  // Add lap row — no scrollIntoView so images stay in view
  const li = document.createElement('li');
  li.className = 'lap-img';
  li.innerHTML = `<span>Q${currentQ+1}-${currentSlot+1}枚目</span><span class="lap-time">${formatTime(ms)}</span>`;
  document.getElementById('lap-list').appendChild(li);

  currentSlot++;

  if (currentSlot < 3) {
    document.getElementById('slot'+currentSlot).classList.add('current');
  } else {
    qLapTimes.push(ms);
    const liQ = document.createElement('li');
    liQ.className = 'lap-q';
    liQ.innerHTML = `<span>Q${currentQ+1} 完了</span><span class="lap-time">${formatTime(ms)}</span>`;
    document.getElementById('lap-list').appendChild(liQ);
    updateProgress(currentQ, 100);
    document.getElementById('pinpon-btn').disabled = true;
    playQuestionClear();

    if (currentQ < 2) {
      setTimeout(() => { playTransition(); currentQ++; loadQuestion(); }, 900);
    } else {
      finishGame(ms);
    }
  }
}

function flashScreen() {
  const f = document.getElementById('flash');
  f.classList.add('on');
  setTimeout(() => f.classList.remove('on'), 80);
}

function updateProgress(qIdx, pct) {
  document.getElementById('prog'+(qIdx+1)).style.width = pct+'%';
}

function finishGame(ms) {
  clearInterval(timerInterval);
  elapsed = ms; finalMs = ms;

  if (ms <= 90000) {
    setTimeout(() => showVictory(ms), 400);
  } else {
    playResultAppear();
    setTimeout(() => showResults(ms), 800);
  }
}

function showVictory(ms) {
  document.getElementById('victory-time-display').textContent = formatTime(ms);
  document.getElementById('victory-screen').classList.add('active');
  playVictoryFanfare();
  startFireworks();
}

function afterVictory() {
  stopFireworks();
  document.getElementById('victory-screen').classList.remove('active');
  showResults(finalMs);
}

function showResults(totalMs) {
  showScreen('result-screen');
  playResultAppear();
  document.getElementById('total-time-display').textContent = formatTime(totalMs);

  let body='', lapIdx=0;
  for (let q=0; q<3; q++) {
    const qTime = qLapTimes[q];
    const prevTime = q===0 ? 0 : qLapTimes[q-1];
    const qDuration = qTime - prevTime;
    body += `<div class="result-set">
      <div class="result-q-header">QUESTION ${q+1}
        <span class="result-q-time">Q: ${formatTime(qDuration)} / Total: ${formatTime(qTime)}</span>
      </div>
      <div class="result-img-grid">`;
    for (let s=0; s<3; s++) {
      const imgNum = questions[q][s];
      const imgTime = lapTimes[lapIdx];
      const prevLap = lapIdx===0 ? 0 : lapTimes[lapIdx-1];
      const duration = imgTime - prevLap;
      lapIdx++;
      body += `<div class="result-img-card">
        <img src="${imgSrc(imgNum)}" alt="">
        <div class="result-img-time">+${formatTime(duration)}<br><span style="color:var(--muted);font-size:10px;">${formatTime(imgTime)}</span></div>
      </div>`;
    }
    body += `</div></div>`;
  }
  document.getElementById('result-body').innerHTML = body;
}

function resetGame() {
  clearInterval(timerInterval);
  stopFireworks();
  document.getElementById('victory-screen').classList.remove('active');
  document.getElementById('stopwatch-bar').style.display='none';
  document.getElementById('timer-display').textContent='00:00.0';
  document.getElementById('timer-display').classList.remove('danger');
  ['prog1','prog2','prog3'].forEach(id=>document.getElementById(id).style.width='0%');
  showScreen('start-screen');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
</script>
